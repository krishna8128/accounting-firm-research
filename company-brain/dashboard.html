<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Brain — Dashboard</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --muted: #666;
      --blue: #3b82f6;
      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;
      --grey: #555;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Mono', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      margin-bottom: 28px;
    }
    header h1 { font-size: 15px; color: var(--text); letter-spacing: 0.05em; }
    header span { color: var(--muted); font-size: 12px; }

    /* Sections */
    .section-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }
    section { margin-bottom: 40px; }

    /* Big metric */
    .metric-row {
      display: flex;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 16px;
    }
    .big-number { font-size: 52px; font-weight: 700; color: var(--text); line-height: 1; }
    .big-number span { font-size: 22px; color: var(--muted); font-weight: 400; }
    .metric-label { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .deadline { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Progress bar */
    .progress-wrap { margin-bottom: 24px; }
    .progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 6px;
    }
    .progress-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding: 6px 12px 6px 0;
    }
    td {
      padding: 8px 12px 8px 0;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    tr:last-child td { border-bottom: none; }
    .founder-cell { color: var(--text); }
    .total-row td { color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
    .num { text-align: right; padding-right: 24px; }

    /* Hypothesis cards */
    .hyp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
    }
    .hyp-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
    }
    .hyp-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .hyp-id { color: var(--muted); font-size: 11px; }
    .hyp-title { font-size: 13px; margin-top: 2px; line-height: 1.4; }
    .status-badge {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 3px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .status-OPEN       { background: #2a2a2a; color: var(--grey); }
    .status-ASSUMED    { background: #3a2500; color: var(--orange); }
    .status-CONFIRMED  { background: #0a2e1a; color: var(--green); }
    .status-CONTRADICTED { background: #2e0a0a; color: var(--red); }

    .hyp-evidence {
      display: flex;
      gap: 16px;
      margin-bottom: 10px;
    }
    .ev-item { font-size: 12px; }
    .ev-label { color: var(--muted); }
    .ev-num { color: var(--text); font-weight: 700; }

    .hyp-test {
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 6px;
    }
    .hyp-test strong { color: #888; }

    .wedge-list { margin: 8px 0 10px 0; }
    .wedge-item {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .wedge-name { color: var(--blue); min-width: 60px; }
    .wedge-desc { color: var(--muted); }

    .hyp-notes {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<script>
// ─── UPDATE AFTER EACH STANDUP ─────────────────────────────────────────────
const DATA = {
  lastUpdated: "2026-05-23",
  weekEnd:     "2026-05-29",
  weekTarget:  9,

  conversations: {
    Krishna: 0,
    Piush:   0,
    Dhruv:   0,
  },

  outreach: {
    Krishna: { indiaSent: 0, usSent: 0, replies: 0, booked: 0, completed: 0 },
    Piush:   { indiaSent: 0, usSent: 0, replies: 0, booked: 0, completed: 0 },
    Dhruv:   { indiaSent: 0, usSent: 0, replies: 0, booked: 0, completed: 0 },
  },

  hypotheses: [
    {
      id: "H1",
      title: "India efficiency angle is dead",
      status: "ASSUMED", // OPEN | ASSUMED | CONFIRMED | CONTRADICTED
      evidenceFor: 0,
      evidenceAgainst: 0,
      keyTest: "Does any owner mention labor cost as top pain?",
      notes: "Articles <10k INR/mo; cost-saving pitch fails"
    },
    {
      id: "H2",
      title: "Three wedges — unconverged",
      status: "OPEN",
      keyTest: "Which pain do owners describe with urgency to pay for?",
      wedges: [
        { name: "Wedge A", desc: "Services-led / embed-and-learn" },
        { name: "Wedge B", desc: "US lead-gen agent for accounting firms" },
        { name: "Wedge C", desc: "Workflow automation" },
      ]
    },
    {
      id: "H3",
      title: "US is the real target market",
      status: "OPEN",
      evidenceFor: 0,
      evidenceAgainst: 0,
      keyTest: "Which market responds and converts from cold outreach?"
    }
  ]
};
// ──────────────────────────────────────────────────────────────────────────
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const founders = ["Krishna", "Piush", "Dhruv"];
  const totalConvos = founders.reduce((s, f) => s + DATA.conversations[f], 0);
  const pct = Math.min(100, Math.round((totalConvos / DATA.weekTarget) * 100));

  // Header
  document.querySelector("#last-updated").textContent = "updated " + DATA.lastUpdated;

  // Big number
  document.querySelector("#conv-total").innerHTML =
    `${totalConvos}<span> / ${DATA.weekTarget}</span>`;
  document.querySelector("#conv-deadline").textContent =
    `target by ${DATA.weekEnd}`;
  document.querySelector("#progress-fill").style.width = pct + "%";
  document.querySelector("#progress-pct").textContent = pct + "% to target";

  // Per-founder conversation row
  const convBody = document.querySelector("#conv-rows");
  founders.forEach(f => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td class="founder-cell">${f}</td><td class="num">${DATA.conversations[f]}</td>`;
    convBody.appendChild(tr);
  });

  // Outreach table
  const outBody = document.querySelector("#outreach-body");
  let totals = { indiaSent: 0, usSent: 0, replies: 0, booked: 0, completed: 0 };
  founders.forEach(f => {
    const r = DATA.outreach[f];
    Object.keys(totals).forEach(k => totals[k] += r[k]);
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="founder-cell">${f}</td>
      <td class="num">${r.indiaSent}</td>
      <td class="num">${r.usSent}</td>
      <td class="num">${r.replies}</td>
      <td class="num">${r.booked}</td>
      <td class="num">${r.completed}</td>`;
    outBody.appendChild(tr);
  });
  const totalRow = document.createElement("tr");
  totalRow.className = "total-row";
  totalRow.innerHTML = `
    <td>total</td>
    <td class="num">${totals.indiaSent}</td>
    <td class="num">${totals.usSent}</td>
    <td class="num">${totals.replies}</td>
    <td class="num">${totals.booked}</td>
    <td class="num">${totals.completed}</td>`;
  outBody.appendChild(totalRow);

  // Hypothesis cards
  const grid = document.querySelector("#hyp-grid");
  DATA.hypotheses.forEach(h => {
    const card = document.createElement("div");
    card.className = "hyp-card";

    let evidenceHTML = "";
    if (h.evidenceFor !== undefined) {
      evidenceHTML = `
        <div class="hyp-evidence">
          <div class="ev-item"><span class="ev-label">for </span><span class="ev-num">${h.evidenceFor}</span></div>
          <div class="ev-item"><span class="ev-label">against </span><span class="ev-num">${h.evidenceAgainst}</span></div>
        </div>`;
    }

    let wedgesHTML = "";
    if (h.wedges) {
      wedgesHTML = `<div class="wedge-list">` +
        h.wedges.map(w =>
          `<div class="wedge-item"><span class="wedge-name">${w.name}</span><span class="wedge-desc">${w.desc}</span></div>`
        ).join("") +
        `</div>`;
    }

    const notesHTML = h.notes
      ? `<div class="hyp-notes">${h.notes}</div>` : "";

    card.innerHTML = `
      <div class="hyp-header">
        <div>
          <div class="hyp-id">${h.id}</div>
          <div class="hyp-title">${h.title}</div>
        </div>
        <span class="status-badge status-${h.status}">${h.status}</span>
      </div>
      ${evidenceHTML}
      ${wedgesHTML}
      ${notesHTML}
      <div class="hyp-test"><strong>key test —</strong> ${h.keyTest}</div>`;
    grid.appendChild(card);
  });
});
</script>

<header>
  <h1>company brain / dashboard</h1>
  <span id="last-updated"></span>
</header>

<!-- SECTION 1: DISCOVERY -->
<section>
  <div class="section-label">01 — Discovery</div>

  <div class="metric-row">
    <div>
      <div class="metric-label">owner conversations this week</div>
      <div class="big-number" id="conv-total"></div>
      <div class="deadline" id="conv-deadline"></div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div style="color:var(--muted);font-size:11px;margin-top:4px;" id="progress-pct"></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>founder</th>
        <th class="num">convos</th>
      </tr>
    </thead>
    <tbody id="conv-rows"></tbody>
  </table>

  <br>

  <table>
    <thead>
      <tr>
        <th>founder</th>
        <th class="num">india sent</th>
        <th class="num">us sent</th>
        <th class="num">replies</th>
        <th class="num">booked</th>
        <th class="num">completed</th>
      </tr>
    </thead>
    <tbody id="outreach-body"></tbody>
  </table>
</section>

<!-- SECTION 2: HYPOTHESES -->
<section>
  <div class="section-label">02 — Hypotheses</div>
  <div class="hyp-grid" id="hyp-grid"></div>
</section>

</body>
</html>
